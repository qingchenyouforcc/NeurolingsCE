name: Build release

on: [workflow_dispatch]

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Fetch full history for Shijima submodules
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          git fetch --unshallow origin $BRANCH_NAME || true
          pushd libshijima
          git fetch --unshallow origin main || true
          echo "libshijima: $(git rev-list HEAD --count) commits"
          popd
      - name: Cache Docker image
        id: cache-docker
        uses: actions/cache@v4
        with:
          path: shijima-qt-dev.tar.gz
          key: docker-fedora-42-qt6-mingw-${{ hashFiles('dev-docker/Dockerfile') }}
      - name: Build Docker image
        if: steps.cache-docker.outputs.cache-hit != 'true'
        run: |
          pushd dev-docker
          docker build -t shijima-qt-dev .
          docker save shijima-qt-dev | gzip > ../shijima-qt-dev.tar.gz
          popd
      - name: Import Docker image
        if: steps.cache-docker.outputs.cache-hit == 'true'
        run: |
          gunzip -c < shijima-qt-dev.tar.gz | docker load
      - name: Patch ElaWidgetTools for Qt 6.8 compatibility
        run: |
          # Remove the Qt version upper bound check in ElaWidgetTools
          # This allows building with Qt 6.8+ in the Docker environment
          sed -i 's/if (${QT_VERSION} VERSION_GREATER 6.7.0 OR ${QT_VERSION} VERSION_LESS 5.12.0)/if (${QT_VERSION} VERSION_LESS 5.12.0)/' ElaWidgetTools/CMakeLists.txt
          # Change FATAL_ERROR to WARNING for the intermediate Qt versions
          sed -i 's/message(FATAL_ERROR "你当前使用的QT版本为不推荐版本/message(WARNING "你当前使用的QT版本为不推荐版本/' ElaWidgetTools/CMakeLists.txt
      - name: Build Windows x86_64 release build
        run: |
          docker run -e CONFIG=release --rm -v "$(pwd)":/work shijima-qt-dev bash -c \
            'dnf install -y mingw64-qt6-qtbase-private-devel 2>/dev/null || true; mingw64-make clean && mingw64-make -j$(nproc) && cp -r licenses publish/Windows/release/'
      - name: Archive Windows x86_64 release build
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x86_64
          path: publish/Windows/release
          retention-days: 1
  build-linux:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner: [ ubuntu-24.04-arm, ubuntu-22.04 ]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Fetch full history for Shijima submodules
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          git fetch --unshallow origin $BRANCH_NAME || true
          pushd libshijima
          git fetch --unshallow origin main || true
          echo "libshijima: $(git rev-list HEAD --count) commits"
          popd
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Qt6
        uses: jdpurcell/install-qt-action@v5
        with:
          # Note: use-naqt removed because naqt doesn't support qttools module
          version: '6.8.2'
          host: ${{ (matrix.runner == 'ubuntu-24.04-arm') && 'linux_arm64' || 'linux' }}
          target: 'desktop'
          arch: ${{ (matrix.runner == 'ubuntu-24.04-arm') && 'linux_gcc_arm64' || 'linux_gcc_64' }}
          modules: 'qtmultimedia'
          cache: true
      - name: Install build dependencies
        run: |
          sudo apt-get install -y libxcb-cursor0 libarchive-dev libwayland-dev wayland-protocols qt6-base-private-dev
      - name: Install build dependencies (arm64)
        if: matrix.runner == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get install -y libgstreamer-plugins-bad1.0-0 libgstreamer-plugins-good1.0-0
      - name: Build Linux release build
        env:
          CONFIG: release
          QT_DIR: ${{ runner.workspace }}/Qt/6.8.2/${{ (matrix.runner == 'ubuntu-24.04-arm') && 'gcc_arm64' || 'gcc_64' }}
        run: |
          export PATH="$QT_DIR/bin:$QT_DIR/libexec:$PATH"
          export PKG_CONFIG_PATH="$QT_DIR/lib/pkgconfig:$PKG_CONFIG_PATH"
          export Qt6_DIR="$QT_DIR/lib/cmake/Qt6"
          # Explicitly set Qt tool paths to ensure they're found
          export MOC="$QT_DIR/libexec/moc"
          export RCC="$QT_DIR/libexec/rcc"
          export LRELEASE="$QT_DIR/bin/lrelease"
          # Add Qt private headers for ElaWidgetTools
          export CXXFLAGS="$CXXFLAGS -I$QT_DIR/include/QtCore/6.8.2 -I$QT_DIR/include/QtCore/6.8.2/QtCore -I$QT_DIR/include/QtWidgets/6.8.2 -I$QT_DIR/include/QtWidgets/6.8.2/QtWidgets"
          make licenses_generated.hpp
          make -j$(nproc)
          make appimage
          cp -r licenses publish/Linux/release/
      - name: Archive Linux release build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ (matrix.runner == 'ubuntu-24.04-arm') && 'release-linux-arm64' || 'release-linux-x86_64' }}
          path: publish/Linux/release
          retention-days: 1
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Fetch full history for Shijima submodules
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          git fetch --unshallow origin $BRANCH_NAME || true
          pushd libshijima
          git fetch --unshallow origin main || true
          echo "libshijima: $(git rev-list HEAD --count) commits"
          popd
      - name: Temporarily let gtar run as root
        run: |
          sudo chown 0:0 /opt/homebrew/bin/gtar
          sudo chmod u+s /opt/homebrew/bin/gtar
      - name: Cache Qt6
        id: cache-qt6
        uses: actions/cache@v4
        with:
          path: /opt/local
          key: macos-14-macports-qt6
      - name: Revoke gtar's root permissions
        run: |
          sudo chmod u-s /opt/homebrew/bin/gtar
      - name: Install Qt6
        if: steps.cache-qt6.outputs.cache-hit != 'true'
        run: |
          wget --no-verbose https://github.com/macports/macports-base/releases/download/v2.10.5/MacPorts-2.10.5-14-Sonoma.pkg
          sudo installer -pkg MacPorts-2.10.5-14-Sonoma.pkg -target /
          export PATH=/opt/local/bin:/opt/local/sbin:$PATH
          yes | sudo port install qt6-qtbase qt6-qtmultimedia pkgconfig libarchive
          sudo rm -rf /opt/local/var/macports/build/*
          sudo rm -rf /opt/local/var/macports/distfiles/*
      - name: Expose MacPorts tools
        run: |
          echo "PATH=/opt/local/bin:/opt/local/sbin:$PATH" >> $GITHUB_ENV
      - name: Build macOS arm64 release build
        env:
          CONFIG: release
        run: |
          make clean
          make -j6
          make macapp
          cp -r licenses publish/macOS/release/
      - name: Archive macOS arm64 release build
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          path: publish/macOS/release
          retention-days: 1
